<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizli Mesaj</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Köhnə brauzerlər üçün ehtiyat */
            height: 100dvh; /* Mobil cihazlar üçün dinamik hündürlük */
            background-color: #fdf5e6;
            margin: 0;
            padding: 20px; /* Kiçik ekranlarda kənarlara yapışmaması üçün boşluq */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Yazının ekran ölçüsünə görə avtomatik kiçilib-böyüməsi (clamp) */
        h2 {
            color: #d8435c;
            margin-bottom: 20px;
            font-size: clamp(20px, 5vw, 26px); 
            text-align: center;
            animation: pilt-pilt 1.5s infinite alternate;
            transition: opacity 0.3s ease;
        }

        @keyframes pilt-pilt {
            from { opacity: 0.7; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }

        /* Zərfin responsiv (cihaza uyğun) ölçüləndirilməsi */
        .zarf-container {
            position: relative;
            width: 100%; /* Ekranın enini tam alır */
            max-width: 450px; /* Amma 450px-dən böyük olmur (kompüterlər üçün) */
            aspect-ratio: 1 / 1; /* Kvadrat formasını qoruyur ki, giflər əyilməsin */
            cursor: pointer;
        }

        .zarf-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.1s ease;
        }

        /* Görünmə sırası və şəffaflıq */
        #zarf_bagli { z-index: 3; opacity: 1; }
        #zarf_animasiya { z-index: 2; opacity: 0; }
        #zarf_aciq { z-index: 1; opacity: 0; }
    </style>
</head>
<body>

    <h2 id="basliq">Zərfi Açmaq Üçün Toxunun</h2>
    
    <div class="zarf-container" id="zarfQutusu">
        <img id="zarf_bagli" src="zarf_bagli.gif" alt="Bağlı Zərf">
        <img id="zarf_animasiya" src="" alt="Zərf Açılır">
        <img id="zarf_aciq" src="" alt="Açıq Zərf">
    </div>

    <script>
        // Arxa planda səssiz yükləmə
        const preloadAnimasiya = new Image();
        preloadAnimasiya.src = 'zarf.gif';
        
        const preloadAciq = new Image();
        preloadAciq.src = 'zarf_aciq.gif';

        const zarfBagli = document.getElementById('zarf_bagli');
        const zarfAnimasiya = document.getElementById('zarf_animasiya');
        const zarfAciq = document.getElementById('zarf_aciq');
        const zarfQutusu = document.getElementById('zarfQutusu');
        const basliq = document.getElementById('basliq');

        let acilib = false;

        zarfQutusu.addEventListener('click', () => {
            if (acilib) return;
            acilib = true;

            // Yazını yox edirik
            basliq.style.opacity = '0';
            setTimeout(() => {
                basliq.style.display = 'none'; 
            }, 300);

            // Bağlı zərfi yox edirik
            zarfBagli.style.opacity = '0';

            // Animasiyanı işə salırıq
            zarfAnimasiya.src = 'zarf.gif'; 
            zarfAnimasiya.style.opacity = '1'; 
            zarfAnimasiya.style.zIndex = '4'; 

            // 1.8 saniyə sonra açıq zərfi göstəririk
            setTimeout(() => {
                zarfAciq.src = 'zarf_aciq.gif';
                zarfAciq.style.opacity = '1';
                zarfAciq.style.zIndex = '5'; 
                zarfAnimasiya.style.opacity = '0'; 
                zarfQutusu.style.cursor = 'default';
            }, 1800); 
        });
    </script>
</body>
</html>
